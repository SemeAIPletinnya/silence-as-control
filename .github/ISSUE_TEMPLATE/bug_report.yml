name: Bug report
description: Report a reproducible problem in the project.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the bug.
      placeholder: A concise summary of the issue.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction steps
      description: Provide clear, ordered steps to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant versions and platform details.
      placeholder: |
        - OS:
        - Python version:
        - Project version/commit:
    validations:
      required: true

  - type: textarea
    id: logs_screenshots
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs, traces, or screenshots.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other context about the problem.
    validations:
      required: false
